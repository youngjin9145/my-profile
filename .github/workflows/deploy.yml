name: Deploy to GitHub Pages

# main 브랜치에 push될 때마다 자동 실행 (+ 수동 실행 버튼)
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나만 배포 (이전 실행은 취소)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1) 빌드: Flutter 웹을 빌드해서 결과물을 업로드
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.5
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --base-href "/my-profile/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # 2) 배포: 업로드된 결과물을 GitHub Pages에 게시
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
